version: "3.9"

services:
  ps-tcp-shell:
    image: mcr.microsoft.com/powershell:latest
    container_name: ps-tcp-shell
    ports:
      - "6969:6969"
    volumes:
      - ./script.ps1:/srv/script.ps1:ro
    command: |
      sh -lc '
        set -e
        apt-get update
        apt-get install -y --no-install-recommends socat
        exec socat -d -d \
          TCP-LISTEN:6969,reuseaddr,fork \
          EXEC:"pwsh -NoLogo -NoProfile -File /srv/script.ps1",pty,rawer,echo=0,stderr,setsid,sigint,sane
      '
    restart: unless-stopped

